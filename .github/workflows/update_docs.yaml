name: Update NotebookLM Docs

on:
  schedule:
    # 毎日 午前9時(JST) / UTC 0:00 に自動実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 自分のリポジトリ（docs-exporterブランチ）をチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: docs-exporter

      # 2. 本家(NVIDIA/NemoClaw)の最新ドキュメント類だけを取得して上書き
      - name: Fetch docs from Upstream
        run: |
          # 一時フォルダに本家の main をクローン
          git clone --depth 1 https://github.com/NVIDIA/NemoClaw.git upstream_temp
          
          # 必要なドキュメント・設定関係のディレクトリ・ファイルだけを上書きコピー
          rsync -av --delete upstream_temp/docs/ docs/ || true
          rsync -av --delete upstream_temp/.agents/ .agents/ || true
          cp -f upstream_temp/*.md ./ || true
          
          # 一時フォルダを削除
          rm -rf upstream_temp

      # 3. 必要なツールのインストール (treeコマンド)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      # 4. Pythonスクリプトの実行（テキスト抽出＆分割）
      - name: Generate NotebookLM Docs
        run: |
          python3 scripts/export_notebooklm_docs.py

      # 5. 変更があればコミット＆プッシュ（output_notebooklm フォルダのみ対象）
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # output_notebooklm フォルダの変更だけをステージング
          git add output_notebooklm/
          
          if git diff --staged --quiet; then
            echo "No changes detected in generated docs."
          else
            git commit -m "chore: auto-update notebooklm docs [skip ci]"
            git push origin docs-exporter
          fi